<section class="py-24 px-6 md:px-12 bg-surface-base overflow-hidden">
    <div class="max-w-screen-2xl mx-auto flex flex-col gap-16">

        <div class="flex flex-col gap-3 max-w-2xl" glass-in>
            <span class="text-primary font-bold text-sm tracking-widest uppercase flex items-center gap-2">
                Metodología de Ingeniería
            </span>
            <h2 class="text-4xl md:text-5xl font-bold text-text-base leading-tight">
                Un flujo <span
                    class="bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">secuencial</span>
                para resultados excepcionales
            </h2>
        </div>

        <div id="fases-grid-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-8 relative">

            @for (phase of phases(); track phase.id; let last = $last) {
            <div class="relative group pl-12 lg:pl-0" [class.step-connector]="!last">

                <div
                    class="glass-effect h-full p-8 rounded-bento border border-primary/5 flex flex-col gap-6 transition-all duration-500 
                            hover:border-secondary/40 hover:shadow-2xl hover:shadow-secondary/5 group relative overflow-hidden bg-white/5">

                    <div
                        class="absolute inset-0 w-full h-full bg-gradient-to-b from-transparent via-secondary/5 to-transparent -translate-y-full group-hover:translate-y-full transition-transform duration-1000">
                    </div>

                    <span class="absolute -right-1 -top-1 text-6xl font-black text-primary/5 select-none 
                                 group-hover:text-secondary/10 group-hover:scale-110 transition-all duration-500">
                        {{ phase.id }}
                    </span>

                    <div
                        class="relative z-10 w-14 h-14 rounded-2xl bg-surface-base border border-text-base/10 flex items-center justify-center 
                                shadow-sm group-hover:border-secondary/50 group-hover:shadow-secondary/20 transition-all duration-300">
                        <div
                            class="absolute inset-0 rounded-2xl bg-secondary/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity">
                        </div>
                        <lucide-icon [name]="phase.icon"
                            [class]="'w-7 h-7 relative z-10 transition-colors ' + (phase.color || 'text-primary')"
                            strokeWidth="1.5">
                        </lucide-icon>
                    </div>

                    <div class="flex flex-col gap-3 relative z-10">
                        <h3
                            class="font-bold text-xl text-text-base leading-tight tracking-tight group-hover:text-primary transition-colors">
                            {{ phase.title }}
                        </h3>
                        <p class="text-xs text-text-base/60 leading-relaxed font-medium">
                            {{ phase.desc }}
                        </p>
                    </div>

                    <div class="mt-auto pt-6 relative z-10">
                        <div class="h-[2px] w-full bg-text-base/5 rounded-full overflow-hidden">
                            <div
                                class="h-full bg-gradient-to-r from-primary to-secondary w-0 group-hover:w-full transition-all duration-700 ease-out">
                            </div>
                        </div>
                        <span class="text-[10px] uppercase tracking-widest text-text-base/30 mt-2 block font-bold">Fase
                            Completada</span>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>
